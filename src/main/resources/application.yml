spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/animals}
    username: ${DB_USERNAME:animals}
    password: ${DB_PASSWORD:animals}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:animal-action}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.example.animalaction
  kafka-topics:
    actions: ${ANIMAL_ACTION_TOPIC:animal-actions}
server:
  port: ${SERVER_PORT:8080}
springdoc:
  swagger-ui:
    url: /openapi/openapi.yaml
    path: /swagger-ui.html
